  cp_fchas_profile:
    checks:
      - name: show_date
        display_command: date
        prompt_dir: "~"
        command: date
        timeout: 10

      - name: goto_fch_etc
        display_command: cd flp_fch/etc/
        prompt_dir: "~"
        display_only: true

      - name: source_setenv
        display_command: . setenv
        prompt_dir: etc
        display_only: true

      - name: cp_fchas_cmadmin_psr_bbs
        display_command: |
          cmadmin
          >psr
          >bbs
          ^C
        prompt_dir: etc
        pty: false
        command: |
          cd flp_fch/etc || exit 1
          . ./setenv || exit 1

          PY_BIN=""
          if command -v python3 >/dev/null 2>&1; then
            PY_BIN="python3"
          elif command -v python >/dev/null 2>&1; then
            PY_BIN="python"
          else
            echo "ERROR: python/python3 is not installed"
            exit 1
          fi

          "$PY_BIN" <<'PY'
          import os
          import pty
          import re
          import select
          import signal
          import subprocess
          import sys
          import time

          master, slave = pty.openpty()
          proc = subprocess.Popen(
              ["cmadmin"],
              stdin=slave,
              stdout=slave,
              stderr=slave,
              close_fds=True,
          )
          os.close(slave)

          def read_until(pattern, timeout):
              buf = ""
              end_at = time.time() + timeout
              rx = re.compile(pattern, re.S)

              while time.time() < end_at:
                  rlist, _, _ = select.select([master], [], [], 0.2)
                  if master in rlist:
                      try:
                          data = os.read(master, 4096)
                      except OSError:
                          return False

                      if not data:
                          return False

                      try:
                          text = data.decode("utf-8", "ignore")
                      except AttributeError:
                          text = data

                      sys.stdout.write(text)
                      sys.stdout.flush()
                      buf += text

                      if rx.search(buf):
                          return True

              return False

          try:
              if not read_until(r">", 10):
                  print("ERROR: cmadmin prompt timeout")
                  try:
                      proc.kill()
                  except Exception:
                      pass
                  sys.exit(1)

              os.write(master, b"psr\n")
              if not read_until(r">", 10):
                  print("ERROR: psr response timeout")
                  try:
                      proc.kill()
                  except Exception:
                      pass
                  sys.exit(1)

              os.write(master, b"bbs\n")
              if not read_until(r"currSvrNum", 10):
                  print("ERROR: bbs output timeout")
                  try:
                      proc.kill()
                  except Exception:
                      pass
                  sys.exit(1)

              os.write(master, b"\x03")
              time.sleep(0.5)

              try:
                  proc.send_signal(signal.SIGINT)
              except Exception:
                  pass

              end_at = time.time() + 2
              while time.time() < end_at:
                  rlist, _, _ = select.select([master], [], [], 0.2)
                  if master in rlist:
                      try:
                          data = os.read(master, 4096)
                      except OSError:
                          break
                      if not data:
                          break
                      try:
                          text = data.decode("utf-8", "ignore")
                      except AttributeError:
                          text = data
                      sys.stdout.write(text)
                      sys.stdout.flush()

              try:
                  proc.terminate()
                  proc.wait()
              except Exception:
                  try:
                      proc.kill()
                  except Exception:
                      pass

              sys.exit(0)

          finally:
              try:
                  os.close(master)
              except Exception:
                  pass
          PY
        timeout: 25
        expect_stdout_contains:
          - Copyright 2013-2017 UnionPay.
          - All Rights Reserved.
          - Svr Name
          - currSvrNum

      - name: cp_fchas_syncthing_process
        display_command: ps -ef | grep '[s]yncthing'
        prompt_dir: etc
        command: ps -ef | grep '[s]yncthing'
        timeout: 15
        expect_stdout_contains:
