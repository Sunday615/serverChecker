default_timeout_sec: 20

profiles:
  cp_ftpas_profile:
    checks:
      - name: show_date
        display_command: date
        prompt_dir: "~"
        command: date
        timeout: 10

      - name: goto_ftpas_sbin
        display_command: cd flp_ftp/sbin/
        prompt_dir: "~"
        display_only: true

      - name: cp_ftpas_status
        display_command: sh ftj.sh status
        prompt_dir: sbin
        command: cd flp_ftp/sbin && sh ftj.sh status
        timeout: 20
        expect_stdout_contains:
          - is RUNNING

      - name: cp_ftpas_vmstat
        display_command: vmstat 1 10
        prompt_dir: sbin
        command: cd flp_ftp/sbin && vmstat 1 10
        timeout: 20

